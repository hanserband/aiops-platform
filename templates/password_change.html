{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-primary">
            <div class="card-header">
                <h3 class="card-title">修改我的密码</h3>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="card-body">
                    {% for field in form %}
                    <div class="form-group">
                        <label>{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                        <div class="text-muted small">{{ field.help_text|safe }}</div>
                    </div>
                    {% endfor %}
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary btn-block">确认修改</button>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
    input[type="password"] { display: block; width: 100%; height: calc(2.25rem + 2px); padding: .375rem .75rem; border: 1px solid #ced4da; border-radius: .25rem; }
    ul { padding-left: 20px; font-size: 12px; color: #666; }
</style>
{% endblock %}
