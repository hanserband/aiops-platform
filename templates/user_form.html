{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-primary">
            <div class="card-header"><h3 class="card-title">编辑用户信息</h3></div>
            <form method="post">
                {% csrf_token %}
                <div class="card-body">
                    <div class="form-group">
                        <label>用户名 (工号)</label>
                        <input type="text" name="username" class="form-control" value="{{ target_user.username }}" required>
                    </div>
                    <div class="form-group">
                        <label>所属部门</label>
                        <input type="text" name="department" class="form-control" value="{{ target_user.department|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="text" name="phone" class="form-control" value="{{ target_user.phone|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" name="email" class="form-control" value="{{ target_user.email }}">
                    </div>

                    <hr>
                    <div class="form-group">
                        <label>系统权限</label>
                        <div class="custom-control custom-switch">
                            <input type="checkbox" class="custom-control-input" id="isAdmin" name="is_superuser" 
                                   {% if target_user.is_superuser %}checked{% endif %}>
                            <label class="custom-control-label" for="isAdmin">
                                <strong>设置为超级管理员</strong>
                            </label>
                        </div>
                        <small class="text-muted">开启后，该用户将拥有系统所有权限（非普通用户）。</small>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{% url 'user_list' %}" class="btn btn-default">返回</a>
                    <button type="submit" class="btn btn-primary float-right">保存修改</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
