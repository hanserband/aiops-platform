{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-header">
    <h3 class="card-title">角色管理</h3>
    <div class="card-tools">
      <a href="{% url 'role_create' %}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 新建角色</a>
    </div>
  </div>
  <div class="card-body p-0">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>角色名称</th>
                <th>关联用户数</th>
                <th>数据权限 (可见分组数)</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for role in roles %}
            <tr>
                <td><strong>{{ role.name }}</strong></td>
                <td><span class="badge badge-info">{{ role.user_count }} 人</span></td>
                <td>
                    {{ role.server_group_auths.count }} 个分组
                </td>
                <td>
                    <a class="btn btn-info btn-xs" href="{% url 'role_edit' role.id %}"><i class="fas fa-edit"></i> 编辑</a>
                    <a class="btn btn-danger btn-xs" href="{% url 'role_delete' role.id %}" onclick="return confirm('确认删除？')"><i class="fas fa-trash"></i> 删除</a>
                </td>
            </tr>
            {% empty %}<tr><td colspan="4">暂无角色</td></tr>{% endfor %}
        </tbody>
    </table>
  </div>
</div>
{% endblock %}
