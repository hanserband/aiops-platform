{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card card-primary">
            <div class="card-header"><h3 class="card-title">添加模型配置</h3></div>
            <form method="post">
                {% csrf_token %}
                <div class="card-body">
                    <div class="form-group">
                        <label>显示名称</label>
                        <input name="name" class="form-control" placeholder="例如: GPT-4, DeepSeek" required>
                    </div>
                    <div class="form-group">
                        <label>模型标识 (Model ID)</label>
                        <input name="model_name" class="form-control" placeholder="API参数名, 如: gpt-4, deepseek-chat" required>
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input name="base_url" class="form-control" value="https://api.openai.com/v1" required>
                        <small class="text-muted">DeepSeek: https://api.deepseek.com/v1</small>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input name="api_key" type="password" class="form-control" required>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary">保存配置</button>
                </div>
            </form>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-header"><h3 class="card-title">已启用模型</h3></div>
            <div class="card-body p-0">
                <table class="table table-striped">
                    <thead><tr><th>名称</th><th>模型ID</th><th>URL</th><th>操作</th></tr></thead>
                    <tbody>
                        {% for m in models %}
                        <tr>
                            <td><strong>{{ m.name }}</strong></td>
                            <td><span class="badge badge-info">{{ m.model_name }}</span></td>
                            <td>{{ m.base_url }}</td>
                            <td>
                                <a href="{% url 'model_delete' m.id %}" class="btn btn-xs btn-danger" onclick="return confirm('确认删除？')">删除</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="4" class="text-center">暂无配置，请先添加</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
