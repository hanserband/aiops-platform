{% extends 'base.html' %}
{% load static %} 
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-warning">
            <div class="card-header">
                <h3 class="card-title">重置密码 - {{ target_user.username }}</h3>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="icon fas fa-info"></i> 您正在强制重置用户密码，无需输入旧密码。
                    </div>
                    {% for field in form %}
                    <div class="form-group">
                        <label>{{ field.label }}</label>
                        {{ field }} <small class="text-danger">{{ field.errors }}</small>
                        <small class="text-muted">{{ field.help_text }}</small>
                    </div>
                    {% endfor %}
                </div>
                <div class="card-footer">
                    <a href="{% url 'user_list' %}" class="btn btn-default">取消</a>
                    <button type="submit" class="btn btn-warning float-right">确认重置</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    input[type="password"] { display: block; width: 100%; height: calc(2.25rem + 2px); padding: .375rem .75rem; font-size: 1rem; font-weight: 400; line-height: 1.5; color: #495057; background-color: #fff; background-clip: padding-box; border: 1px solid #ced4da; border-radius: .25rem; box-shadow: inset 0 0 0 transparent; transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out; }
</style>
{% endblock %}
